<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Velata ScratchPad — redesign (clean sheet)</title>
<style>
  :root{
    --backdrop:#0E0F12;
    --paper:#FCFCFD;          /* the sheet */
    --raise:#F2F3F6;          /* hover */
    --raise-2:#EAECF0;        /* active */
    --ink:#191B20;            /* primary */
    --ink-2:#646A75;          /* secondary */
    --ink-3:#A4A9B3;          /* tertiary / hints / gutter */
    --line:#EBECF0;           /* hairline */
    --radius:18px;
    --sans:-apple-system,BlinkMacSystemFont,"SF Pro Text","PingFang SC","Hiragino Sans GB",system-ui,sans-serif;
    --mono:"SF Mono",ui-monospace,monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:var(--sans);background:var(--backdrop);color:var(--ink);-webkit-font-smoothing:antialiased;overflow:hidden;position:relative}

  /* muted backdrop so the light sheet floats */
  .terminal{position:absolute;inset:0;padding:46px 54px;font-family:var(--mono);font-size:13px;line-height:2.3;color:#2a2d33;user-select:none;background:radial-gradient(150% 130% at 72% -10%, #131418 0%, var(--backdrop) 60%)}
  .terminal .ln{white-space:pre}
  .terminal .pmt{color:#3c424d;opacity:.5}.terminal .ok{color:#3a5046;opacity:.5}
  .terminal .cursor{display:inline-block;width:7px;height:15px;background:#2a2d33;opacity:.4;vertical-align:-2px}
  .scrim{position:absolute;inset:0;background:rgba(6,7,9,.5)}

  .stage{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;padding:24px}

  /* the sheet */
  .sheet{
    width:min(740px,94vw);height:min(480px,82vh);
    display:flex;flex-direction:column;
    background:var(--paper);
    border:1px solid rgba(20,22,30,.06);
    border-radius:var(--radius);
    box-shadow:0 1px 0 #fff inset, 0 50px 120px -34px rgba(0,0,0,.62), 0 12px 32px -14px rgba(0,0,0,.4);
    overflow:hidden;position:relative;
  }

  /* slim top progress line — only visible while refining */
  .progress{position:absolute;top:0;left:0;height:2px;width:0;background:var(--ink);opacity:0;transition:opacity .2s}
  .sheet.refining .progress{opacity:.85;animation:load 2.1s ease-in-out infinite}
  @keyframes load{0%{width:0;left:0}55%{width:75%;left:0}100%{width:0;left:100%}}

  /* top affordance row: drafts toggle + tiny gutter tag */
  .top{display:flex;align-items:center;justify-content:space-between;padding:16px 20px 0}
  .drafts-toggle{display:inline-flex;align-items:center;gap:8px;background:none;border:none;cursor:pointer;font-family:var(--mono);font-size:11.5px;color:var(--ink-2);padding:5px 8px;border-radius:7px;transition:.15s}
  .drafts-toggle:hover{background:var(--raise);color:var(--ink)}
  .drafts-toggle .stack{display:inline-flex;flex-direction:column;gap:2px}
  .drafts-toggle .stack i{display:block;width:13px;height:2px;background:currentColor;border-radius:2px}
  .tag{font-family:var(--mono);font-size:11px;color:var(--ink-3)}

  .body{flex:1;display:flex;min-height:0}

  /* drafts rail (collapsed by default) */
  .rail{width:0;flex:none;overflow:hidden;border-right:1px solid var(--line);transition:width .22s ease}
  .sheet.rail-open .rail{width:228px}
  .rail-inner{width:228px;height:100%;display:flex;flex-direction:column;padding:8px 8px 12px}
  .rail-head{font-family:var(--mono);font-size:10.5px;letter-spacing:.09em;text-transform:uppercase;color:var(--ink-3);padding:8px 10px 6px}
  .draft-list{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:1px}
  .draft-list::-webkit-scrollbar{width:8px}.draft-list::-webkit-scrollbar-thumb{background:rgba(20,22,30,.12);border-radius:8px;border:2px solid transparent;background-clip:padding-box}
  .draft{display:flex;gap:9px;padding:9px 10px;border-radius:9px;cursor:default;color:var(--ink-2);transition:.14s}
  .draft .dot{width:4px;height:4px;border-radius:50%;background:currentColor;opacity:.45;margin-top:7px;flex:none}
  .draft .t{font-size:13px;line-height:1.45;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .draft:hover{background:var(--raise);color:var(--ink)}
  .draft.active{background:var(--raise-2);color:var(--ink);font-weight:500}
  .draft.new{color:var(--ink-3)}.draft.new .p{font-family:var(--mono);margin-top:-1px}

  /* editor — the hero */
  .main{flex:1;display:flex;flex-direction:column;min-width:0}
  .editor{
    flex:1;overflow-y:auto;padding:26px 40px 16px;
    font-size:18px;line-height:1.72;color:var(--ink);letter-spacing:-.003em;
    outline:none;white-space:pre-wrap;word-break:break-word;caret-color:var(--ink);
  }
  .editor.empty{display:flex;flex-direction:column;justify-content:center;align-items:flex-start;padding:26px 44px}
  .editor .lead{font-size:26px;font-weight:600;letter-spacing:-.02em;color:var(--ink);margin-bottom:10px}
  .editor .sub{color:var(--ink-3);font-size:15px;font-weight:400}
  code,.k{font-family:var(--mono);font-size:.86em;background:var(--raise-2);padding:1px 6px;border-radius:6px;color:var(--ink)}
  .editor.dim{color:var(--ink-2)}

  .caption{padding:0 40px 14px;font-family:var(--mono);font-size:11px;color:var(--ink-3);display:flex;gap:14px}
  .caption .u{color:var(--ink-2)}

  /* footer hint bar */
  .footer{display:flex;align-items:center;justify-content:space-between;padding:13px 22px;border-top:1px solid var(--line)}
  .hints{display:flex;align-items:center;gap:18px}
  .hint{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--ink-2)}
  .keycap{font-family:var(--mono);font-size:11px;color:var(--ink-2);line-height:1;padding:3px 7px;border-radius:6px;background:var(--raise);border:1px solid var(--line)}
  .meta{font-family:var(--mono);font-size:11px;color:var(--ink-3)}

  /* prototype controls */
  .switcher{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:4px;z-index:20;padding:5px 6px;border-radius:12px;background:rgba(255,255,255,.95);box-shadow:0 10px 30px -10px rgba(0,0,0,.5);border:1px solid rgba(0,0,0,.06)}
  .switcher .lbl{font-family:var(--mono);font-size:10px;color:#9aa0aa;padding:0 6px;text-transform:uppercase;letter-spacing:.08em}
  .switcher button{font-family:var(--sans);font-size:12px;font-weight:500;color:#646a75;background:transparent;border:none;cursor:pointer;padding:6px 11px;border-radius:8px;transition:.15s}
  .switcher button:hover{color:#191b20;background:#f2f3f6}
  .switcher button.on{color:#fff;background:#191b20}
  :focus-visible{outline:none;box-shadow:0 0 0 2px rgba(25,27,32,.25)}

  @media (prefers-reduced-motion:reduce){*{animation:none !important;transition:none !important}}
</style>
</head>
<body>

  <div class="terminal" aria-hidden="true">
    <div class="ln"><span class="pmt">➜</span>  ~/projects/auth-service  <span style="opacity:.4">git:(</span>main<span style="opacity:.4">)</span></div>
    <div class="ln"><span class="ok">●</span> claude-code  ready</div>
    <div class="ln"> </div>
    <div class="ln"><span class="pmt">➜</span>  <span class="cursor"></span></div>
  </div>
  <div class="scrim" aria-hidden="true"></div>

  <div class="stage">
    <div class="sheet" id="sheet">
      <div class="progress"></div>
      <div class="top">
        <button class="drafts-toggle" id="toggle"><span class="stack"><i></i><i></i><i></i></span><span id="toggleLabel">Drafts · 1</span></button>
        <span class="tag" id="tag">zh → en</span>
      </div>
      <div class="body">
        <aside class="rail"><div class="rail-inner">
          <div class="rail-head">Drafts</div>
          <div class="draft-list" id="draftList"></div>
        </div></aside>
        <div class="main">
          <div class="editor" id="editor"></div>
          <div class="caption" id="caption"></div>
          <div class="footer">
            <div class="hints" id="hints"></div>
            <div class="meta" id="meta"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="switcher">
    <span class="lbl">state</span>
    <button data-s="empty">Empty</button>
    <button data-s="editing" class="on">Editing</button>
    <button data-s="refining">Refining</button>
    <button data-s="refined">Refined</button>
    <button data-s="drafts">Drafts open</button>
  </div>

<script>
  const sheet=document.getElementById('sheet');
  const editor=document.getElementById('editor');
  const caption=document.getElementById('caption');
  const draftList=document.getElementById('draftList');
  const hints=document.getElementById('hints');
  const meta=document.getElementById('meta');
  const toggle=document.getElementById('toggle');
  const toggleLabel=document.getElementById('toggleLabel');
  const tag=document.getElementById('tag');

  const HINT_DEFAULT=`
    <div class="hint"><span class="keycap">⌘K</span> Refine</div>
    <div class="hint"><span class="keycap">⌘↵</span> Copy &amp; Close</div>
    <div class="hint"><span class="keycap">esc</span> Dismiss</div>`;
  const MESSY=`帮我 refactor 这个 <code>useAuth</code> hook，把 retry 的逻辑抽出去成一个单独的 util，然后那个 token refresh 的部分要加 error handling，如果 refresh 失败就 redirect 去 login page`;
  const CLEAN=`Refactor the <code>useAuth</code> hook: extract the retry logic into a separate util, and add error handling to the token-refresh path so that a failed refresh redirects the user to the login page.`;

  const MANY=`
    <div class="draft active"><span class="dot"></span><span class="t">Refactor the useAuth hook: extract the retry logic into a separate util and add error handling to the token refresh path</span></div>
    <div class="draft"><span class="dot"></span><span class="t">写一个 GitHub Actions workflow，在 push 到 main 的时候跑 lint、typecheck 和单元测试</span></div>
    <div class="draft"><span class="dot"></span><span class="t">Explain why this query is doing a full table scan and how to add the right index</span></div>
    <div class="draft"><span class="dot"></span><span class="t">把这段 commit message 改成 conventional commits 格式</span></div>
    <div class="draft new"><span class="p">+</span> New draft</div>`;

  function setToggle(n){toggleLabel.textContent='Drafts · '+n}

  const states={
    empty(){
      sheet.className='sheet';setToggle(1);tag.textContent='zh → en';
      editor.className='editor empty';
      editor.innerHTML=`<span class="lead">Speak, or just type.</span><span class="sub">Your words land here — refine before they go anywhere.</span>`;
      caption.innerHTML='';hints.innerHTML=HINT_DEFAULT;meta.textContent='GLM-4 · local mode';
    },
    editing(){
      sheet.className='sheet';setToggle(1);tag.textContent='zh → en';
      editor.className='editor';editor.innerHTML=MESSY;
      caption.innerHTML=`<span>42 words</span><span>draft saved</span>`;hints.innerHTML=HINT_DEFAULT;meta.textContent='GLM-4 · local mode';
    },
    refining(){
      sheet.className='sheet refining';setToggle(1);tag.textContent='zh → en';
      editor.className='editor dim';editor.innerHTML=MESSY;
      caption.innerHTML=`<span class="u">Refining…</span>`;hints.innerHTML=`<div class="hint"><span class="keycap">esc</span> Cancel</div>`;meta.textContent='GLM-4 · local mode';
    },
    refined(){
      sheet.className='sheet';setToggle(1);tag.textContent='zh → en';
      editor.className='editor';editor.innerHTML=CLEAN;
      caption.innerHTML=`<span class="u">Refined</span><span>⌘Z to undo</span>`;hints.innerHTML=HINT_DEFAULT;meta.textContent='GLM-4 · local mode';
    },
    drafts(){
      sheet.className='sheet rail-open';setToggle(5);tag.textContent='zh → en';
      draftList.innerHTML=MANY;editor.className='editor';editor.innerHTML=CLEAN;
      caption.innerHTML=`<span class="u">Refined</span><span>⌘Z to undo</span>`;hints.innerHTML=HINT_DEFAULT;meta.textContent='5 drafts';
    }
  };

  document.querySelectorAll('.switcher button').forEach(b=>{
    b.addEventListener('click',()=>{
      document.querySelectorAll('.switcher button').forEach(x=>x.classList.remove('on'));
      b.classList.add('on');states[b.dataset.s]();
    });
  });
  toggle.addEventListener('click',()=>{
    if(!sheet.classList.contains('rail-open')){states.drafts();}
    else{sheet.classList.toggle('rail-open');}
  });

  states.editing();
</script>
</body>
</html>
